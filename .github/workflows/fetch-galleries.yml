name: Fetch Gallery Feeds

# ── DeviantArt ────────────────────────────────────────────────────────────
# Fetches via the official OAuth2 API (client_credentials grant — app-level
# auth, safe unattended). Replaced the old RSS scrape after confirming
# backend.deviantart.com/rss.xml is blocked at the CloudFront/WAF edge
# regardless of IP or headers. Reliable and fully automated.
#
# ── ArtStation ───────────────────────────────────────────────────────────
# No public API exists. RSS and the internal JSON endpoint are both behind
# a Cloudflare Managed Challenge (confirmed: cf-mitigated: challenge header,
# cType: 'managed'), which requires real JS execution to pass — plain curl
# cannot clear it under any header combination. Fetches via a real
# Playwright/Chromium browser instead.
#
# Running this from GitHub Actions (a datacenter IP) is LESS reliable than
# running it from a residential connection — datacenter ASNs get harsher
# Cloudflare scrutiny, the same root cause that blocked DA's RSS endpoint.
# Accepted as a deliberate tradeoff for zero local dependency. To compensate:
#   - A failed fetch NEVER overwrites existing gallery data.
#   - A failed fetch opens (or keeps open) a tracking GitHub issue, so
#     failures are visible instead of silent. It auto-closes once a
#     scheduled run succeeds again.
#   - scripts/add_artstation_item.py remains available as a zero-fragility
#     manual fallback if automated fetching degrades over time (expected
#     eventually, as Cloudflare's headless-browser detection evolves).
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit updated data/ back to the repo
      issues: write      # open/close the ArtStation failure-tracking issue

    env:
      DA_CLIENT_ID: ${{ secrets.DA_CLIENT_ID }}
      DA_CLIENT_SECRET: ${{ secrets.DA_CLIENT_SECRET }}
      FOLDER_ID_FEATURED: "AF28499D-4BA6-CE99-C30B-FFA9D9E18DF6"
      FOLDER_ID_2D_ART: "15D635F9-F26E-C751-6B7D-F29C006E46E6"
      FOLDER_ID_3D_ART: "A4550B8A-4D55-60A5-AD83-B545A34C21A2"
      FOLDER_ID_CHARACTER_DESIGN: "83A221E4-C7BF-E206-D0F6-544CA72DD37B"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── DeviantArt ──────────────────────────────────────────────────────
      - name: Fetch DeviantArt galleries via OAuth2 API
        run: |
          mkdir -p data
          python3 scripts/fetch_deviantart_api.py --username RilyRobo --folder-id "$FOLDER_ID_FEATURED"          --output data/da-featured.json
          python3 scripts/fetch_deviantart_api.py --username RilyRobo --folder-id "$FOLDER_ID_2D_ART"            --output data/da-2d-art.json
          python3 scripts/fetch_deviantart_api.py --username RilyRobo --folder-id "$FOLDER_ID_3D_ART"            --output data/da-3d-art.json
          python3 scripts/fetch_deviantart_api.py --username RilyRobo --folder-id "$FOLDER_ID_CHARACTER_DESIGN"  --output data/da-character-design.json

      # ── ArtStation: Playwright ──────────────────────────────────────────
      - name: Cache Playwright browser binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install Playwright + Chromium
        run: |
          pip install -r scripts/requirements.txt --break-system-packages
          playwright install --with-deps chromium

      - name: Fetch ArtStation via Playwright (best-effort)
        id: artstation_fetch
        continue-on-error: true   # a failure here is expected/recoverable, not a build-breaking error
        run: python3 scripts/fetch_artstation_playwright.py

      - name: Track ArtStation fetch health
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.artstation_fetch.outcome }}' === 'failure';
            const title = '⚠ ArtStation automated fetch is failing';
            const { owner, repo } = context.repo;

            const open = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'artstation-fetch'
            });
            const existing = open.data.find(i => i.title === title);

            if (failed && !existing) {
              await github.rest.issues.create({
                owner, repo, title,
                labels: ['artstation-fetch'],
                body: [
                  'The automated ArtStation fetch (Playwright) failed on the latest scheduled run.',
                  '',
                  "This usually means Cloudflare's challenge escalated beyond what a headless browser can clear automatically from GitHub's datacenter IP range.",
                  '',
                  '**Existing gallery data was left untouched — nothing is broken on the live site.**',
                  '',
                  'To add new ArtStation pieces manually in the meantime:',
                  '```',
                  'python3 scripts/add_artstation_item.py',
                  '```',
                  '',
                  'This issue closes automatically once a scheduled fetch succeeds again.'
                ].join('\n')
              });
            } else if (!failed && existing) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.number, state: 'closed'
              });
            }

      # ── Commit whatever succeeded ────────────────────────────────────────
      - name: Commit updated gallery data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to gallery data."
          else
            git commit -m "chore: update gallery feeds [skip ci]"
            git push
          fi